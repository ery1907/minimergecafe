<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mini Merge Cafe</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Trebuchet MS", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #fff8d9 0, transparent 34%),
        radial-gradient(circle at bottom right, #ffd2dc 0, transparent 36%),
        linear-gradient(180deg, #fff3e8, #ffdcbf);
      color: #5a3825;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    button {
      font-weight: 900;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding: 12px 12px 94px;
      background:
        linear-gradient(rgba(255, 243, 232, 0.88), rgba(255, 243, 232, 0.94)),
        radial-gradient(circle at 8% 16%, rgba(76, 175, 122, 0.14), transparent 24%),
        radial-gradient(circle at 92% 50%, rgba(255, 159, 67, 0.16), transparent 24%);
      overflow-x: hidden;
      position: relative;
    }

    .topbar {
      background: rgba(255,255,255,0.85);
      border: 2px solid #f4cf9c;
      border-radius: 26px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 8px 18px rgba(90,56,37,0.12);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fff3e8;
      border: 3px solid #d69456;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 29px;
      box-shadow: inset 0 2px 8px rgba(90,56,37,0.12);
    }

    h1 {
      margin: 0;
      flex: 1;
      text-align: center;
      font-size: 25px;
      color: #653719;
      letter-spacing: 1px;
    }

    .gear {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #fff8ef;
      border: 2px solid #f1c27d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
      box-shadow: 0 4px 10px rgba(90,56,37,0.12);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .stat-pill {
      background: #fff8ef;
      border: 2px solid #f1c27d;
      border-radius: 18px;
      padding: 8px 5px;
      font-size: 15px;
      font-weight: 900;
      text-align: center;
      box-shadow: inset 0 2px 6px rgba(90,56,37,0.06);
    }

    .orders-section {
      background: rgba(255,255,255,0.88);
      border: 2px solid #f4cf9c;
      border-radius: 24px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(90,56,37,0.1);
      margin-bottom: 13px;
    }

    .section-ribbon {
      width: fit-content;
      margin: -25px auto 10px;
      background: linear-gradient(180deg, #ff8fa8, #ef5d7a);
      color: white;
      padding: 8px 28px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 17px;
      box-shadow: 0 5px 12px rgba(90,56,37,0.18);
      border: 2px solid rgba(255,255,255,0.55);
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .customers {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 3px 2px 4px;
      scroll-snap-type: x mandatory;
    }

    .customers::-webkit-scrollbar {
      display: none;
    }

    .customer-card {
      min-width: 138px;
      background: #fff7e8;
      border: 2px solid #f1c27d;
      border-radius: 19px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(90,56,37,0.1);
      scroll-snap-align: start;
      position: relative;
      transition: 0.2s;
    }

    .customer-card.ready {
      border-color: #4caf7a;
      box-shadow: 0 0 0 3px rgba(76,175,122,0.18), 0 5px 12px rgba(90,56,37,0.12);
    }

    .ready-check {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #4caf7a;
      color: white;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
    }

    .avatar {
      font-size: 36px;
      height: 38px;
      margin-bottom: 3px;
    }

    .order-emoji {
      font-size: 34px;
      margin: 2px 0;
    }

    .order-name {
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .reward {
      display: flex;
      justify-content: center;
      gap: 8px;
      font-weight: 900;
      font-size: 13px;
      margin-bottom: 7px;
    }

    .serve-btn {
      background: linear-gradient(180deg, #78c943, #43a92c);
      border: 2px solid #328c1f;
      box-shadow: 0 4px 0 #2c761d;
      color: white;
      padding: 8px 10px;
      border-radius: 13px;
      font-size: 14px;
      width: 100%;
    }

    .serve-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #2c761d;
    }

    .board-frame {
      background: linear-gradient(180deg, #bc7337, #8c4d27);
      border-radius: 28px;
      padding: 12px;
      border: 4px solid #6f391b;
      box-shadow:
        inset 0 4px 8px rgba(255,255,255,0.25),
        inset 0 -8px 12px rgba(0,0,0,0.18),
        0 10px 22px rgba(90,56,37,0.25);
      margin-bottom: 12px;
    }

    .board-label {
      width: fit-content;
      margin: -2px auto 10px;
      background: linear-gradient(180deg, #9a552b, #713717);
      color: white;
      padding: 8px 38px;
      border-radius: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.18);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 7px;
      background: rgba(90,56,37,0.13);
      border-radius: 20px;
      padding: 8px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      background: linear-gradient(180deg, #fff1d9, #f7d5aa);
      border: 2px solid #e4af74;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 30px;
      box-shadow:
        inset 0 3px 5px rgba(255,255,255,0.6),
        inset 0 -3px 6px rgba(90,56,37,0.09);
      cursor: pointer;
      transition: 0.16s;
    }

    .cell:hover {
      transform: translateY(-1px);
    }

    .cell.selected {
      outline: 4px solid #ffb703;
      box-shadow: 0 0 16px rgba(255,183,3,0.75);
    }

    .cell.drag-over {
      outline: 4px solid #4caf7a;
    }

    .machine {
      color: white;
      border: 3px solid #5a3825;
      box-shadow: 0 5px 12px rgba(90,56,37,0.25);
    }

    .drink-machine {
      background: linear-gradient(180deg, #79c7e8, #2e8ebb);
    }

    .dessert-machine {
      background: linear-gradient(180deg, #ffb6c8, #e6789a);
    }

    .machine-label,
    .item-name {
      position: absolute;
      bottom: 2px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 6.5px;
      font-weight: 900;
      color: #5a3825;
      pointer-events: none;
    }

    .machine-label {
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }

    .item {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      animation: itemFloat 2s infinite ease-in-out;
    }

    @keyframes itemFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .pop {
      animation: pop 0.35s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0.2) rotate(-12deg); opacity: 0; }
      65% { transform: scale(1.18) rotate(5deg); opacity: 1; }
      100% { transform: scale(1); }
    }

    .lucky-cell {
      border-color: #ffb703;
      box-shadow: 0 0 16px rgba(255,183,3,0.8);
      background: linear-gradient(180deg, #fff5bd, #ffd36e);
    }

    .mini-badge {
      position: absolute;
      top: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      border: 2px solid white;
      box-shadow: 0 3px 8px rgba(0,0,0,0.18);
      z-index: 3;
    }

    .badge-lucky { left: -8px; background: #ffb703; }
    .badge-star { left: 16px; background: #8338ec; }
    .badge-ready { right: -8px; background: #4caf7a; }

    .hint-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.92);
      border: 2px solid #f4cf9c;
      border-radius: 22px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 6px 14px rgba(90,56,37,0.12);
    }

    .helper { font-size: 34px; }
    .message { flex: 1; font-weight: 900; font-size: 14px; line-height: 1.35; }
    .bulb { font-size: 27px; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 10px;
      width: min(456px, calc(100% - 18px));
      background: rgba(255,248,239,0.96);
      border: 2px solid #f1c27d;
      border-radius: 26px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 7px;
      box-shadow: 0 -8px 24px rgba(90,56,37,0.18);
      z-index: 50;
    }

    .nav-btn {
      background: transparent;
      color: #5a3825;
      border: none;
      box-shadow: none;
      padding: 7px 4px;
      border-radius: 18px;
      font-size: 24px;
      font-weight: 900;
    }

    .nav-btn.active {
      background: linear-gradient(180deg, #ffb6c8, #ff8fa8);
      color: #7b2b42;
    }

    .nav-btn span {
      display: block;
      font-size: 11px;
      margin-top: 2px;
    }

    .sheet {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: -100%;
      width: min(456px, 100%);
      max-height: 72vh;
      background: #fff8ef;
      border-radius: 28px 28px 0 0;
      border: 3px solid #f1c27d;
      box-shadow: 0 -14px 35px rgba(90,56,37,0.28);
      padding: 16px;
      z-index: 80;
      overflow-y: auto;
      transition: bottom 0.28s ease;
    }

    .sheet.show { bottom: 0; }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 13px;
    }

    .sheet-header h2 {
      margin: 0;
      font-size: 22px;
      color: #653719;
    }

    .close-btn {
      width: auto;
      background: #ff8fa8;
      border: 2px solid #d95776;
      padding: 8px 13px;
      border-radius: 14px;
      color: white;
      font-weight: 900;
    }

    .panel-card {
      background: white;
      border: 2px solid #f1c27d;
      border-radius: 20px;
      padding: 13px;
      margin-bottom: 11px;
      box-shadow: 0 5px 13px rgba(90,56,37,0.09);
    }

    .panel-card h3 {
      margin: 0 0 8px;
      color: #653719;
      font-size: 18px;
    }

    .panel-card p {
      margin: 5px 0;
      font-size: 14px;
      line-height: 1.35;
    }

    .green-btn,
    .orange-btn,
    .blue-btn {
      color: white;
      border-radius: 14px;
      padding: 10px;
      width: 100%;
      margin-top: 7px;
      font-weight: 900;
    }

    .green-btn {
      background: linear-gradient(180deg, #78c943, #43a92c);
      border: 2px solid #328c1f;
    }

    .orange-btn {
      background: linear-gradient(180deg, #ffb24a, #ff8c1a);
      border: 2px solid #d96e00;
    }

    .blue-btn {
      background: linear-gradient(180deg, #79c7e8, #2e8ebb);
      border: 2px solid #1c6f97;
    }

    .renovation-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.42);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 12px;
    }

    .renovation-modal.show { display: flex; }

    .renovation-card {
      width: min(456px, 100%);
      max-height: 94vh;
      overflow-y: auto;
      background: #fff8ef;
      border-radius: 28px;
      border: 3px solid #f1c27d;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.3);
    }

    .renovation-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .renovation-top h2 {
      margin: 0;
      color: #653719;
      font-size: 22px;
    }

    .cafe-scene {
      height: 350px;
      background:
        linear-gradient(rgba(255,246,232,0.80), rgba(255,226,199,0.88)),
        radial-gradient(circle at 80% 18%, rgba(121,199,232,0.25), transparent 22%);
      border: 3px solid #d69456;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(90,56,37,0.1);
      margin-bottom: 12px;
    }

    .wall {
      position: absolute;
      inset: 0 0 84px;
      background:
        radial-gradient(circle at 12% 12%, rgba(76,175,122,0.2), transparent 15%),
        radial-gradient(circle at 90% 10%, rgba(121,199,232,0.2), transparent 19%);
    }

    .floor {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 88px;
      background: repeating-linear-gradient(90deg, #c9824a, #c9824a 34px, #a96538 34px, #a96538 68px);
      opacity: 0.82;
    }

    .window {
      position: absolute;
      right: 18px;
      top: 36px;
      width: 82px;
      height: 82px;
      border: 5px solid #9a552b;
      border-radius: 12px;
      background: linear-gradient(180deg, #9bd6ff, #e9f8ff);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.5);
    }

    .window::before,
    .window::after {
      content: "";
      position: absolute;
      background: #9a552b;
    }

    .window::before {
      width: 5px;
      height: 100%;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .window::after {
      height: 5px;
      width: 100%;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    .lamp {
      position: absolute;
      left: 50%;
      top: 8px;
      width: 4px;
      height: 50px;
      background: #5a3825;
    }

    .lamp::after {
      content: "";
      position: absolute;
      top: 45px;
      left: 50%;
      transform: translateX(-50%);
      width: 46px;
      height: 24px;
      background: #2f2b27;
      border-radius: 28px 28px 8px 8px;
      box-shadow: 0 10px 25px rgba(255,184,77,0.8);
    }

    .lamp-glow {
      position: absolute;
      left: 50%;
      top: 58px;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,211,110,0.45), transparent 70%);
      animation: glowPulse 2s infinite ease-in-out;
    }

    @keyframes glowPulse {
      0%,100% { opacity: 0.65; }
      50% { opacity: 1; }
    }

    .cafe-sign {
      position: absolute;
      top: 24px;
      left: 22px;
      background: #402a1c;
      color: #fff7d7;
      border: 4px solid #9a552b;
      border-radius: 10px;
      width: 118px;
      height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 900;
      line-height: 1.2;
      font-size: 14px;
    }

    .cafe-sign.fixed {
      background: #2f1d12;
      border-color: #ffb24a;
      box-shadow: 0 0 18px rgba(255,178,74,0.8);
    }

    .counter {
      position: absolute;
      left: 22px;
      bottom: 86px;
      width: 190px;
      height: 78px;
      background: linear-gradient(180deg, #c78d64, #8c5634);
      border: 4px solid #5a3825;
      border-radius: 16px 16px 8px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 900;
    }

    .counter.clean {
      box-shadow: 0 0 18px rgba(255,255,255,0.85);
      filter: brightness(1.08);
    }

    .espresso {
      position: absolute;
      left: 70px;
      bottom: 154px;
      width: 78px;
      height: 56px;
      background: linear-gradient(180deg, #82c5e0, #397f9d);
      border: 4px solid #2e5262;
      border-radius: 12px;
      z-index: 2;
    }

    .espresso::after {
      content: "";
      position: absolute;
      right: 8px;
      bottom: -18px;
      width: 28px;
      height: 22px;
      border-radius: 0 0 12px 12px;
      background: white;
      border: 3px solid #5a3825;
    }

    .display-case {
      position: absolute;
      left: 225px;
      bottom: 94px;
      width: 112px;
      height: 70px;
      background: rgba(255,255,255,0.72);
      border: 4px solid #7b3f00;
      border-radius: 16px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 23px;
      box-shadow: 0 0 16px rgba(255,255,255,0.65);
    }

    .display-visible .display-case { display: flex; }

    .table {
      position: absolute;
      right: 34px;
      bottom: 52px;
      width: 88px;
      height: 42px;
      background: #a96538;
      border: 4px solid #5a3825;
      border-radius: 50%;
      display: none;
      z-index: 3;
    }

    .table::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 34px;
      width: 18px;
      height: 48px;
      background: #5a3825;
      transform: translateX(-50%);
      border-radius: 9px;
    }

    .chair-scene {
      position: absolute;
      display: none;
      z-index: 2;
      width: 42px;
      height: 50px;
      border-radius: 12px;
      border: 4px solid #5a3825;
      background: #8d6e63;
    }

    .chair-scene::before {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: -13px;
      height: 18px;
      background: inherit;
      border: 4px solid #5a3825;
      border-top: none;
      border-radius: 0 0 12px 12px;
    }

    .chairs-visible .table,
    .chairs-visible .chair-scene {
      display: block;
    }

    .chair-scene.c1 { right: 60px; bottom: 104px; }
    .chair-scene.c2 { right: 60px; bottom: 16px; }
    .chair-scene.c3 { right: 8px; bottom: 58px; }

    .chair-scene.wood { background: #a86b3c; }
    .chair-scene.blue { background: #3f87a8; }
    .chair-scene.pink { background: #ec8eab; }

    .wall-decor {
      position: absolute;
      right: 122px;
      top: 64px;
      width: 66px;
      height: 46px;
      border-radius: 12px;
      background: #fffaf4;
      border: 4px solid #7b3f00;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 23px;
    }

    .decor-visible .wall-decor { display: flex; }

    .plant {
      position: absolute;
      left: 250px;
      bottom: 30px;
      width: 42px;
      height: 54px;
      display: none;
      z-index: 4;
      animation: plantMove 2.4s infinite ease-in-out;
    }

    .plant::before {
      content: "";
      position: absolute;
      left: 11px;
      bottom: 0;
      width: 22px;
      height: 22px;
      background: #a96538;
      border: 3px solid #5a3825;
      border-radius: 4px 4px 10px 10px;
    }

    .plant::after {
      content: "🌿";
      position: absolute;
      left: -4px;
      bottom: 14px;
      font-size: 42px;
    }

    .plant-visible .plant { display: block; }

    @keyframes plantMove {
      0%,100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    .stain {
      position: absolute;
      width: 46px;
      height: 25px;
      background:
        radial-gradient(circle at 30% 40%, rgba(80,42,20,0.78), transparent 35%),
        radial-gradient(circle at 62% 50%, rgba(90,45,22,0.68), transparent 45%),
        rgba(92,45,20,0.48);
      border-radius: 60% 40% 55% 45%;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 2px 5px rgba(90,56,37,0.2);
      cursor: pointer;
      z-index: 5;
      animation: stainPulse 1.8s infinite ease-in-out;
    }

    .stain.cleanable {
      outline: 3px solid rgba(255,183,3,0.75);
      box-shadow: 0 0 18px rgba(255,183,3,0.8);
    }

    @keyframes stainPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .stain.s1 { left: 40px; bottom: 142px; transform: rotate(-8deg); }
    .stain.s2 { left: 122px; bottom: 112px; transform: rotate(8deg); }
    .stain.s3 { left: 160px; bottom: 152px; transform: rotate(-3deg); }

    .task-box {
      background: white;
      border: 2px solid #f1c27d;
      border-radius: 22px;
      padding: 13px;
      box-shadow: 0 5px 13px rgba(90,56,37,0.09);
    }

    .task-box h3 {
      margin: 0 0 6px;
      color: #653719;
      font-size: 20px;
    }

    .task-box p {
      margin: 5px 0;
      line-height: 1.35;
      font-size: 14px;
    }

    .choice-row {
      display: flex;
      gap: 9px;
      margin-top: 10px;
    }

    .choice {
      flex: 1;
      background: #fff3e8;
      border: 2px solid #f1c27d;
      border-radius: 17px;
      padding: 10px 6px;
      text-align: center;
      font-weight: 900;
      cursor: pointer;
      position: relative;
    }

    .choice.selected {
      border-color: #4caf7a;
      box-shadow: 0 0 0 3px rgba(76,175,122,0.18);
    }

    .chair-preview {
      height: 70px;
      width: 54px;
      margin: 0 auto 7px;
      border: 4px solid #5a3825;
      border-radius: 14px 14px 10px 10px;
      position: relative;
    }

    .chair-preview::before {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: -19px;
      height: 24px;
      border: 4px solid #5a3825;
      border-top: none;
      border-radius: 0 0 12px 12px;
      background: inherit;
    }

    .chair-preview::after {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      top: 12px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.35);
    }

    .chair-wood { background: linear-gradient(180deg, #b97741, #8e512c); }
    .chair-blue { background: linear-gradient(180deg, #6bb5d6, #3f87a8); }
    .chair-pink { background: linear-gradient(180deg, #ffb6c8, #e6789a); }

    .choice small {
      display: block;
      color: #8b5e34;
      margin-top: 3px;
      font-size: 11px;
    }

    @media (min-width: 760px) {
      .app {
        max-width: 520px;
        margin: 20px 0;
        border-radius: 30px;
        min-height: auto;
        box-shadow: 0 15px 40px rgba(90,56,37,0.2);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="title-row">
        <div class="logo">☕</div>
        <h1>Mini Merge Cafe</h1>
        <div class="gear">⚙️</div>
      </div>

      <div class="stats">
        <div class="stat-pill" id="coinsText">🪙 0</div>
        <div class="stat-pill" id="partsText">🔧 0</div>
        <div class="stat-pill" id="energyText">⚡ 30/75</div>
      </div>
    </div>

    <div class="orders-section">
      <div class="section-ribbon">Today's Orders</div>
      <div class="customers" id="customers"></div>
    </div>

    <div class="board-frame">
      <div class="board-label">MERGE BOARD</div>
      <div class="board" id="board"></div>
    </div>

    <div class="hint-bubble">
      <div class="helper">🐱</div>
      <div class="message" id="message">Merge matching items to serve customers!</div>
      <div class="bulb">💡</div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="openSheet('orders', this)">📋<span>Orders</span></button>
    <button class="nav-btn" onclick="openSheet('cafe', this)">🏡<span>Cafe</span></button>
    <button class="nav-btn" onclick="openSheet('gift', this)">🎁<span>Gift</span></button>
    <button class="nav-btn" onclick="openSheet('shop', this)">🛒<span>Shop</span></button>
  </div>

  <div class="sheet" id="sheet">
    <div class="sheet-header">
      <h2 id="sheetTitle">Panel</h2>
      <button class="close-btn" onclick="closeSheet()">Close</button>
    </div>
    <div id="sheetContent"></div>
  </div>

  <div class="renovation-modal" id="renovationModal">
    <div class="renovation-card">
      <div class="renovation-top">
        <h2>🏡 Cafe Renovation</h2>
        <button class="close-btn" onclick="closeRenovation()">Close</button>
      </div>

      <div class="cafe-scene" id="cafeScene">
        <div class="wall"></div>
        <div class="window"></div>
        <div class="lamp"></div>
        <div class="lamp-glow"></div>
        <div class="cafe-sign" id="cafeSign">GOOD<br>COFFEE</div>
        <div class="wall-decor" id="wallDecor">♡</div>
        <div class="counter" id="counter">Counter</div>
        <div class="espresso"></div>
        <div class="display-case">🧁 🍰</div>
        <div class="table"></div>
        <div class="chair-scene c1" id="chair1"></div>
        <div class="chair-scene c2" id="chair2"></div>
        <div class="chair-scene c3" id="chair3"></div>
        <div class="plant"></div>
        <div class="stain s1" id="stain1" onclick="cleanStain(1)"></div>
        <div class="stain s2" id="stain2" onclick="cleanStain(2)"></div>
        <div class="stain s3" id="stain3" onclick="cleanStain(3)"></div>
        <div class="floor"></div>
      </div>

      <div class="task-box">
        <h3 id="taskTitle">Current Task</h3>
        <p id="taskDesc"></p>
        <p id="taskReq"></p>
        <div id="taskAction"></div>
      </div>
    </div>
  </div>

  <script>
    const items = [
      { name: "Cookie", emoji: "🍪", chain: "dessert", level: 1 },
      { name: "Cupcake", emoji: "🧁", chain: "dessert", level: 2 },
      { name: "Cake", emoji: "🍰", chain: "dessert", level: 3 },
      { name: "Special Cake", emoji: "🎂", chain: "dessert", level: 4 },
      { name: "Bean", emoji: "🫘", chain: "drink", level: 1 },
      { name: "Coffee", emoji: "☕", chain: "drink", level: 2 },
      { name: "Latte", emoji: "🥤", chain: "drink", level: 3 },
      { name: "Fancy Drink", emoji: "🍹", chain: "drink", level: 4 }
    ];

    const mergeMap = { 0: 1, 1: 2, 2: 3, 4: 5, 5: 6, 6: 7 };
    const customerPool = ["👩", "👨", "👵", "🧑", "👱‍♀️", "🧔", "👦", "👩‍🦰"];

    const cafeTasks = [
      { title: "Clean the Counter", cost: 60, type: "clean", desc: "Tap the glowing stains in the cafe scene.", energy: 3 },
      { title: "Fix the Cafe Sign", cost: 110, type: "repair", desc: "Attach 3 sign parts to make it shine.", energy: 4 },
      { title: "Buy New Chairs", cost: 180, type: "chairs", desc: "Choose a chair style and place it in the cafe.", energy: 0 },
      { title: "Add Dessert Display", cost: 160, type: "item", itemRequired: 1, desc: "Use a Cupcake from your board for the display.", energy: 5 },
      { title: "Decorate the Wall", cost: 190, type: "decor", desc: "Choose a decoration for your cafe wall.", energy: 2 },
      { title: "Place a Plant", cost: 150, type: "plant", desc: "Place a plant to make the cafe feel alive.", energy: 3 }
    ];

    function makeItem(item, opts = {}) {
      return {
        item,
        lucky: opts.lucky || false,
        chainBadge: opts.chainBadge || false
      };
    }

    const boardSize = 30;
    const drinkMachineIndex = 5;
    const dessertMachineIndex = 24;

    let board = Array(boardSize).fill(null);
    let coins = 0;
    let parts = 0;
    let energy = 30;
    let maxEnergy = 75;
    let drinkMachineLevel = 1;
    let dessertMachineLevel = 1;
    let cafeLevel = 1;
    let completedTasks = 0;
    let selectedIndex = null;
    let draggedIndex = null;
    let newItemIndex = null;
    let mergedItemIndex = null;
    let customers = [];
    let giftProgress = 0;
    let giftReady = false;
    let ordersSinceLastPart = 0;
    let adCooldown = false;
    let adCooldownSeconds = 0;
    let adTimer = null;
    let repairClicks = 0;
    let chairStyle = null;
    let chairSteps = 0;
    let plantSteps = 0;

    let cleanStains = { 1: false, 2: false, 3: false };

    let cafeState = {
      clean: false,
      sign: false,
      chairs: null,
      display: false,
      decor: null,
      plant: false
    };

    const boardEl = document.getElementById("board");
    const customersEl = document.getElementById("customers");
    const messageEl = document.getElementById("message");

    function playSound(type) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = type === "error" ? 180 : type === "order" ? 760 : type === "merge" ? 520 : 900;
        gain.gain.setValueAtTime(0.06, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
        osc.start();
        osc.stop(ctx.currentTime + 0.12);
      } catch(e) {}
    }

    function setMsg(text) {
      messageEl.textContent = text;
    }

    function createBoard() {
      boardEl.innerHTML = "";

      for (let i = 0; i < boardSize; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.index = i;

        if (i === selectedIndex) cell.classList.add("selected");
        if (i === newItemIndex || i === mergedItemIndex) cell.classList.add("pop");

        cell.ondragover = allowDrop;
        cell.ondragleave = e => e.currentTarget.classList.remove("drag-over");
        cell.ondrop = dropItem;

        if (i === drinkMachineIndex) {
          cell.classList.add("machine", "drink-machine");
          cell.innerHTML = `<div>${getMachineEmoji("drink")}</div><div class="machine-label">Drink Lv.${drinkMachineLevel}</div>`;
          cell.onclick = () => generateItem("drink");
        } else if (i === dessertMachineIndex) {
          cell.classList.add("machine", "dessert-machine");
          cell.innerHTML = `<div>${getMachineEmoji("dessert")}</div><div class="machine-label">Dessert Lv.${dessertMachineLevel}</div>`;
          cell.onclick = () => generateItem("dessert");
        } else {
          const data = board[i];

          if (data) {
            if (data.lucky) cell.classList.add("lucky-cell");

            const item = items[data.item];
            cell.innerHTML = `
              <div class="item" draggable="true" ondragstart="dragStart(event, ${i})">${item.emoji}</div>
              <div class="item-name">${item.name}</div>
            `;

            if (data.lucky) addBadge(cell, "✨", "badge-lucky");
            if (data.chainBadge) addBadge(cell, "⭐", "badge-star");
            if (isOrderReady(data.item)) addBadge(cell, "✓", "badge-ready");
          }

          cell.onclick = () => tapCell(i);
        }

        boardEl.appendChild(cell);
      }

      setTimeout(() => {
        newItemIndex = null;
        mergedItemIndex = null;
      }, 400);
    }

    function addBadge(cell, text, cls) {
      const b = document.createElement("div");
      b.className = "mini-badge " + cls;
      b.textContent = text;
      cell.appendChild(b);
    }

    function getMachineEmoji(type) {
      const lvl = type === "drink" ? drinkMachineLevel : dessertMachineLevel;

      if (type === "drink") {
        return lvl === 1 ? "☕" : lvl === 2 ? "🥤" : lvl === 3 ? "🍹" : "🧋";
      }

      return lvl === 1 ? "🍪" : lvl === 2 ? "🧁" : lvl === 3 ? "🍰" : "🎂";
    }

    function dragStart(e, index) {
      draggedIndex = index;
      selectedIndex = null;
      e.dataTransfer.setData("text/plain", index);
    }

    function allowDrop(e) {
      e.preventDefault();
      const target = Number(e.currentTarget.dataset.index);

      if (target !== drinkMachineIndex && target !== dessertMachineIndex) {
        e.currentTarget.classList.add("drag-over");
      }
    }

    function dropItem(e) {
      e.preventDefault();

      const target = Number(e.currentTarget.dataset.index);
      e.currentTarget.classList.remove("drag-over");

      if (draggedIndex === null || draggedIndex === target) return;

      moveOrMerge(draggedIndex, target);
      draggedIndex = null;
      createBoard();
    }

    function tapCell(index) {
      if (selectedIndex === null) {
        if (board[index]) {
          selectedIndex = index;
          setMsg("Selected! Tap target.");
          createBoard();
        }
        return;
      }

      if (selectedIndex === index) {
        selectedIndex = null;
        setMsg("Selection cancelled.");
        createBoard();
        return;
      }

      moveOrMerge(selectedIndex, index);
      selectedIndex = null;
      createBoard();
    }

    function moveOrMerge(from, to) {
      if (to === drinkMachineIndex || to === dessertMachineIndex) return;

      const a = board[from];
      const b = board[to];

      if (!a) return;

      if (!b) {
        board[to] = a;
        board[from] = null;
        setMsg("Item moved.");
        return;
      }

      if (a.item === b.item && mergeMap[a.item] !== undefined) {
        const newItem = mergeMap[a.item];

        board[to] = makeItem(newItem, {
          lucky: a.lucky || b.lucky,
          chainBadge: newItem === 7 || a.chainBadge || b.chainBadge
        });

        board[from] = null;
        mergedItemIndex = to;

        if (newItem === 7) setMsg("Fancy Drink completed! ⭐");
        else setMsg((a.lucky || b.lucky) ? "Lucky merge! ✨" : "Nice merge!");

        playSound("merge");
        return;
      }

      setMsg("Only same items merge.");
      playSound("error");
    }

    function generateItem(type) {
      if (energy <= 0) {
        setMsg("No energy. Use Gift, Recycle or Boost.");
        playSound("error");
        return;
      }

      const empty = [];

      for (let i = 0; i < boardSize; i++) {
        if (i !== drinkMachineIndex && i !== dessertMachineIndex && board[i] === null) empty.push(i);
      }

      if (empty.length === 0) {
        setMsg("Board full. Merge or recycle.");
        playSound("error");
        return;
      }

      energy--;

      const slot = empty[Math.floor(Math.random() * empty.length)];
      const item = getMachineItem(type);
      const lucky = Math.random() < 0.08;

      board[slot] = makeItem(item, { lucky });
      newItemIndex = slot;

      setMsg(lucky ? "Lucky item! ✨" : "New item!");
      playSound("upgrade");
      updateAll();
    }

    function getMachineItem(type) {
      const level = type === "drink" ? drinkMachineLevel : dessertMachineLevel;
      const r = Math.random();

      if (type === "dessert") {
        if (level === 1) return 0;
        if (level === 2) return r < 0.82 ? 0 : 1;
        if (level === 3) return r < 0.65 ? 0 : r < 0.92 ? 1 : 2;
        return r < 0.5 ? 0 : r < 0.8 ? 1 : r < 0.96 ? 2 : 3;
      }

      if (level === 1) return 4;
      if (level === 2) return r < 0.82 ? 4 : 5;
      if (level === 3) return r < 0.65 ? 4 : r < 0.92 ? 5 : 6;
      return r < 0.5 ? 4 : r < 0.8 ? 5 : r < 0.96 ? 6 : 7;
    }

    function createCustomers() {
      customersEl.innerHTML = "";

      customers.forEach((c, index) => {
        const ready = board.some(x => x && x.item === c.order);
        const card = document.createElement("div");

        card.className = "customer-card" + (ready ? " ready" : "");

        card.innerHTML = `
          ${ready ? `<div class="ready-check">✓</div>` : ""}
          <div class="avatar">${c.avatar}</div>
          <div class="order-emoji">${items[c.order].emoji}</div>
          <div class="order-name">${items[c.order].name}</div>
          <div class="reward">
            <span>🪙 ${getReward(c.order)}</span>
            ${c.givesPart ? `<span>🔧 +1</span>` : ""}
          </div>
          <button class="serve-btn" onclick="serveCustomer(${index})">Serve</button>
        `;

        customersEl.appendChild(card);
      });
    }

    function setupCustomers() {
      customers = [];
      customers.push(newCustomer());
      customers.push(newCustomer());
      customers.push(newCustomer());
    }

    function newCustomer(replaceIndex = -1) {
      const used = customers
        .map((c, i) => i !== replaceIndex ? c.order : null)
        .filter(x => x !== null);

      let pool = availableOrders().filter(x => !used.includes(x));

      if (pool.length === 0) pool = availableOrders();

      return {
        avatar: customerPool[Math.floor(Math.random() * customerPool.length)],
        order: pool[Math.floor(Math.random() * pool.length)],
        givesPart: orderGivesPart()
      };
    }

    function availableOrders() {
      let arr = [1, 2, 5, 6];

      if (cafeLevel >= 2) arr.push(3);
      if (cafeLevel >= 3) arr.push(7);

      return arr;
    }

    function orderGivesPart() {
      if (ordersSinceLastPart >= 4) return true;
      return Math.random() < 0.25;
    }

    function getReward(itemIndex) {
      const base = { 1: 20, 2: 45, 3: 85, 4: 150 };
      return base[items[itemIndex].level] + (cafeLevel - 1) * 5;
    }

    function isOrderReady(itemIndex) {
      return customers.some(c => c.order === itemIndex);
    }

    function serveCustomer(index) {
      const c = customers[index];
      const boardIndex = board.findIndex(x => x && x.item === c.order);

      if (boardIndex === -1) {
        setMsg("Order item not ready.");
        playSound("error");
        return;
      }

      const served = board[boardIndex];

      board[boardIndex] = null;

      let reward = getReward(c.order);

      if (served.lucky) reward += 25;

      coins += reward;

      let partMsg = "";

      if (c.givesPart) {
        parts++;
        ordersSinceLastPart = 0;
        partMsg = " +1 🔧";
      } else {
        ordersSinceLastPart++;
      }

      giftProgress++;
      customers[index] = newCustomer(index);

      setMsg((served.lucky ? "Lucky order! " : "Served! ") + "+" + reward + " 🪙" + partMsg);
      playSound("order");
      updateAll();
    }

    function openSheet(type, btn) {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));

      if (btn) btn.classList.add("active");

      const sheet = document.getElementById("sheet");
      const title = document.getElementById("sheetTitle");
      const content = document.getElementById("sheetContent");

      if (type === "orders") {
        title.textContent = "📋 Orders";

        content.innerHTML = `
          <div class="panel-card">
            <h3>Today’s Orders</h3>
            <p>Serve customers from the cards above. Green cards mean the item is ready.</p>
            <p>Lucky items ✨ give +25 bonus coins.</p>
          </div>
        `;
      }

      if (type === "cafe") {
        const task = cafeTasks[completedTasks];

        title.textContent = "🏡 Cafe";

        content.innerHTML = `
          <div class="panel-card">
            <h3>${task ? task.title : "All tasks completed ✅"}</h3>
            <p>${task ? task.desc : "Your cafe looks great."}</p>
            <p>${task ? "Need: " + task.cost + " 🪙" : ""}</p>
            <button class="orange-btn" onclick="closeSheet(); openRenovation();">Open Renovation</button>
          </div>

          <div class="panel-card">
            <h3>Cafe Progress</h3>
            <p>Level: ${cafeLevel}</p>
            <p>Tasks: ${completedTasks % 3}/3</p>
          </div>
        `;
      }

      if (type === "gift") {
        title.textContent = "🎁 Gift";

        content.innerHTML = `
          <div class="panel-card">
            <h3>Gift Box</h3>
            <p>${giftReady ? "Gift ready! Claim +8 energy." : "Serve " + giftProgress + "/3 customers to unlock."}</p>
            <button class="green-btn" onclick="claimGift(); openSheet('gift')" ${giftReady ? "" : "disabled"}>
              ${giftReady ? "Claim +8 ⚡" : "Locked"}
            </button>
          </div>

          <div class="panel-card">
            <h3>Recycle</h3>
            <p>Select an item on the board. Recycle it for energy.</p>
            <button class="green-btn" onclick="recycleSelected(); openSheet('gift')">Recycle Selected Item</button>
          </div>

          <div class="panel-card">
            <h3>Energy Boost</h3>
            <p>Watch a short ad break to get +15 energy.</p>
            <button class="blue-btn" onclick="watchAd(); openSheet('gift')" ${adCooldown ? "disabled" : ""}>
              ${adCooldown ? "Available in " + adCooldownSeconds + "s" : "Watch Ad +15 ⚡"}
            </button>
          </div>
        `;
      }

      if (type === "shop") {
        title.textContent = "🛒 Shop";

        content.innerHTML = `
          <div class="panel-card">
            <h3>Drink Machine</h3>
            <p>Level: ${drinkMachineLevel}</p>
            <p>${drinkMachineLevel >= 4 ? "Max Level" : "Cost: " + upgradeCost("drink") + " 🔧"}</p>
            <button class="blue-btn" onclick="upgradeMachine('drink'); openSheet('shop')" ${drinkMachineLevel >= 4 ? "disabled" : ""}>
              ${drinkMachineLevel >= 4 ? "Max Level" : "Upgrade Drink"}
            </button>
          </div>

          <div class="panel-card">
            <h3>Dessert Machine</h3>
            <p>Level: ${dessertMachineLevel}</p>
            <p>${dessertMachineLevel >= 4 ? "Max Level" : "Cost: " + upgradeCost("dessert") + " 🔧"}</p>
            <button class="orange-btn" onclick="upgradeMachine('dessert'); openSheet('shop')" ${dessertMachineLevel >= 4 ? "disabled" : ""}>
              ${dessertMachineLevel >= 4 ? "Max Level" : "Upgrade Dessert"}
            </button>
          </div>
        `;
      }

      sheet.classList.add("show");
    }

    function closeSheet() {
      document.getElementById("sheet").classList.remove("show");
    }

    function claimGift() {
      if (!giftReady) return;

      energy = Math.min(maxEnergy, energy + 8);
      giftProgress = 0;
      giftReady = false;

      setMsg("Gift claimed! +8 ⚡");
      playSound("upgrade");
      updateAll();
    }

    function recycleSelected() {
      if (selectedIndex === null || !board[selectedIndex]) {
        setMsg("Select an item first.");
        playSound("error");
        return;
      }

      const obj = board[selectedIndex];
      const gain = Math.min(6, items[obj.item].level + (obj.lucky ? 1 : 0));

      board[selectedIndex] = null;
      selectedIndex = null;
      energy = Math.min(maxEnergy, energy + gain);

      setMsg("Recycled! +" + gain + " ⚡");
      playSound("upgrade");
      updateAll();
    }

    function watchAd() {
      if (adCooldown) return;

      let seconds = 5;

      setMsg("Ad break... 5s");
      adCooldown = true;

      const countdown = setInterval(() => {
        seconds--;
        setMsg("Ad break... " + seconds + "s");

        if (seconds <= 0) {
          clearInterval(countdown);

          energy = Math.min(maxEnergy, energy + 15);

          setMsg("Ad reward! +15 ⚡");
          playSound("upgrade");
          startAdCooldown();
          updateAll();
        }
      }, 1000);
    }

    function startAdCooldown() {
      adCooldownSeconds = 60;

      if (adTimer) clearInterval(adTimer);

      adTimer = setInterval(() => {
        adCooldownSeconds--;

        if (adCooldownSeconds <= 0) {
          clearInterval(adTimer);
          adCooldown = false;
        }
      }, 1000);
    }

    function upgradeMachine(type) {
      const lvl = type === "drink" ? drinkMachineLevel : dessertMachineLevel;

      if (lvl >= 4) {
        setMsg("Machine already max.");
        return;
      }

      const cost = upgradeCost(type);

      if (parts < cost) {
        setMsg("Need " + cost + " 🔧.");
        playSound("error");
        return;
      }

      parts -= cost;

      if (type === "drink") drinkMachineLevel++;
      else dessertMachineLevel++;

      energy = Math.min(maxEnergy, energy + 10);

      setMsg("Machine upgraded! +10 ⚡");
      playSound("upgrade");
      updateAll();
    }

    function upgradeCost(type) {
      const lvl = type === "drink" ? drinkMachineLevel : dessertMachineLevel;
      return lvl === 1 ? 3 : lvl === 2 ? 6 : lvl === 3 ? 10 : 999;
    }

    function openRenovation() {
      document.getElementById("renovationModal").classList.add("show");
      renderCafe();
      renderTask();
    }

    function closeRenovation() {
      document.getElementById("renovationModal").classList.remove("show");
    }

    function renderCafe() {
      const scene = document.getElementById("cafeScene");

      scene.classList.toggle("display-visible", cafeState.display);
      scene.classList.toggle("chairs-visible", cafeState.chairs !== null);
      scene.classList.toggle("decor-visible", cafeState.decor !== null);
      scene.classList.toggle("plant-visible", cafeState.plant);

      document.getElementById("counter").classList.toggle("clean", cafeState.clean);
      document.getElementById("cafeSign").classList.toggle("fixed", cafeState.sign);

      const task = cafeTasks[completedTasks];
      const isCleanTask = task && task.type === "clean";

      [1, 2, 3].forEach(num => {
        const stain = document.getElementById("stain" + num);

        stain.style.display = cafeState.clean || cleanStains[num] ? "none" : "block";
        stain.classList.toggle("cleanable", isCleanTask);
      });

      ["chair1", "chair2", "chair3"].forEach(id => {
        const el = document.getElementById(id);

        el.className = el.className
          .replace(/\bwood\b|\bblue\b|\bpink\b/g, "")
          .trim();

        if (cafeState.chairs) el.classList.add(cafeState.chairs);
      });

      const decor = document.getElementById("wallDecor");

      if (cafeState.decor === "clock") decor.textContent = "◷";
      else if (cafeState.decor === "heart") decor.textContent = "♡";
      else decor.textContent = "▧";
    }

    function renderTask() {
      const task = cafeTasks[completedTasks];

      if (!task) {
        document.getElementById("taskTitle").textContent = "All tasks completed ✅";
        document.getElementById("taskDesc").textContent = "Your cafe looks amazing.";
        document.getElementById("taskReq").textContent = "";
        document.getElementById("taskAction").innerHTML = "";
        return;
      }

      document.getElementById("taskTitle").textContent = task.title;
      document.getElementById("taskDesc").textContent = task.desc;

      let req = "Need: " + task.cost + " 🪙";

      if (task.itemRequired !== undefined) {
        req += " + " + items[task.itemRequired].emoji + " " + items[task.itemRequired].name;
      }

      req += " | Reward: " + (task.energy ? "+" + task.energy + " ⚡" : "Cafe upgrade");

      document.getElementById("taskReq").textContent = req;

      const action = document.getElementById("taskAction");

      if (task.type === "clean") {
        action.innerHTML = `<p>Tap the glowing stains in the cafe scene.</p>`;
      }

      if (task.type === "repair") {
        action.innerHTML = `
          <p>Sign parts attached: ${repairClicks}/3</p>
          <button class="orange-btn" onclick="repairStep()">Attach Sign Part</button>
        `;
      }

      if (task.type === "chairs") {
        action.innerHTML = `
          <p>Choose one chair style:</p>
          <div class="choice-row">
            <div class="choice ${chairStyle === "wood" ? "selected" : ""}" onclick="chooseChair('wood')">
              <div class="chair-preview chair-wood"></div>
              Wood Classic
              <small>Warm cafe style</small>
            </div>
            <div class="choice ${chairStyle === "blue" ? "selected" : ""}" onclick="chooseChair('blue')">
              <div class="chair-preview chair-blue"></div>
              Blue Comfort
              <small>Cozy soft style</small>
            </div>
            <div class="choice ${chairStyle === "pink" ? "selected" : ""}" onclick="chooseChair('pink')">
              <div class="chair-preview chair-pink"></div>
              Pink Chic
              <small>Sweet cafe style</small>
            </div>
          </div>
        `;
      }

      if (task.type === "item") {
        action.innerHTML = `<button class="orange-btn" onclick="completeItemTask()">Place Item</button>`;
      }

      if (task.type === "decor") {
        action.innerHTML = `
          <p>Choose a wall decoration:</p>
          <div class="choice-row">
            <div class="choice" onclick="chooseDecor('art')">▧<br>Art</div>
            <div class="choice" onclick="chooseDecor('clock')">◷<br>Clock</div>
            <div class="choice" onclick="chooseDecor('heart')">♡<br>Heart</div>
          </div>
        `;
      }

      if (task.type === "plant") {
        action.innerHTML = `
          <p>Plant placement: ${plantSteps}/2</p>
          <button class="green-btn" onclick="plantStep()">Place Plant</button>
        `;
      }
    }

    function canPayTask(task) {
      if (coins < task.cost) {
        setMsg("Not enough coins.");
        playSound("error");
        return false;
      }

      if (
        task.itemRequired !== undefined &&
        !board.some(x => x && x.item === task.itemRequired)
      ) {
        setMsg("Need " + items[task.itemRequired].emoji + " " + items[task.itemRequired].name + ".");
        playSound("error");
        return false;
      }

      return true;
    }

    function payTask(task) {
      coins -= task.cost;

      if (task.itemRequired !== undefined) {
        const idx = board.findIndex(x => x && x.item === task.itemRequired);

        if (idx !== -1) board[idx] = null;
      }
    }

    function finishTask(callback) {
      const task = cafeTasks[completedTasks];

      if (!canPayTask(task)) return;

      payTask(task);

      if (callback) callback();

      if (task.energy) energy = Math.min(maxEnergy, energy + task.energy);

      completedTasks++;
      repairClicks = 0;
      chairStyle = null;
      chairSteps = 0;
      plantSteps = 0;

      setMsg("Task completed: " + task.title + "!");
      playSound("upgrade");

      if (completedTasks > 0 && completedTasks % 3 === 0) {
        cafeLevel++;
        setMsg("Cafe Level Up! Level " + cafeLevel);
      }

      renderCafe();
      renderTask();
      updateAll();
    }

    function cleanStain(num) {
      const task = cafeTasks[completedTasks];

      if (!task || task.type !== "clean") {
        setMsg("Not the current task.");
        return;
      }

      if (!canPayTask(task)) return;

      cleanStains[num] = true;

      renderCafe();

      if (Object.values(cleanStains).filter(Boolean).length >= 3) {
        finishTask(() => cafeState.clean = true);
      }
    }

    function repairStep() {
      const task = cafeTasks[completedTasks];

      if (!canPayTask(task)) return;

      repairClicks++;

      if (repairClicks >= 3) finishTask(() => cafeState.sign = true);
      else renderTask();
    }

    function chooseChair(style) {
      const task = cafeTasks[completedTasks];

      if (!canPayTask(task)) return;

      chairStyle = style;
      cafeState.chairs = style;

      renderCafe();

      document.getElementById("taskAction").innerHTML = `
        <p>Place chairs: ${chairSteps}/3</p>
        <button class="green-btn" onclick="placeChair()">Place Chair</button>
      `;
    }

    function placeChair() {
      chairSteps++;

      if (chairSteps >= 3) finishTask(() => {});
      else {
        document.getElementById("taskAction").innerHTML = `
          <p>Place chairs: ${chairSteps}/3</p>
          <button class="green-btn" onclick="placeChair()">Place Chair</button>
        `;
      }
    }

    function completeItemTask() {
      const task = cafeTasks[completedTasks];

      finishTask(() => {
        if (task.title.includes("Dessert")) cafeState.display = true;
      });
    }

    function chooseDecor(style) {
      finishTask(() => cafeState.decor = style);
    }

    function plantStep() {
      const task = cafeTasks[completedTasks];

      if (!canPayTask(task)) return;

      plantSteps++;

      if (plantSteps >= 2) finishTask(() => cafeState.plant = true);
      else renderTask();
    }

    function updateAll() {
      document.getElementById("coinsText").textContent = "🪙 " + coins;
      document.getElementById("partsText").textContent = "🔧 " + parts;
      document.getElementById("energyText").textContent = "⚡ " + energy + "/" + maxEnergy;

      giftReady = giftProgress >= 3;

      createBoard();
      createCustomers();
    }

    setupCustomers();
    updateAll();

    generateItem("drink");
    generateItem("dessert");
    generateItem("drink");

    setMsg("Merge matching items to serve customers!");
  </script>
</body>
</html>
